<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SSW CBT Exam</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/prometric.css">
</head>

<body class="prometric-body">

<header class="prometric-header">

    <div class="exam-title">
        <span class="title-main">
            Specified Skilled Worker Tests
        </span>

        <span class="title-sub" id="exam-title">
            特定技能1号
        </span>
    </div>


    <div class="header-right">

        <div class="progress-info" id="progress-text">
            Answered: 0 / 0 Questions
        </div>

        <div class="timer-box">
            <span class="timer-clock">⏱</span>
            <span id="countdown-timer">
                00:00
            </span>
        </div>


        <button class="btn-ctrl btn-pause" id="btn-pause">
            ⏸ Pause
        </button>

        <button class="btn-ctrl btn-finish" id="btn-finish">
            Finish Test
        </button>

    </div>

</header>


<div class="prometric-subheader">

    <div class="subheader-left">
        <strong>Test :</strong>
        <span id="test-name">
            CBT Simulation
        </span>
    </div>


    <div class="subheader-right">
        Candidate:
        <span id="nama-peserta">
            Guest
        </span>
    </div>

</div>

<div class="prometric-main">

    <aside class="exam-sidebar">

        <div class="sidebar-header">
            <h3>
                Question Number
            </h3>
        </div>

        <div class="question-grid" id="number-grid"></div>


        <div class="grid-legend">

            <div class="legend-item">
                <span class="legend-color belum"></span>
                Unanswered
            </div>

            <div class="legend-item">
                <span class="legend-color sudah"></span>
                Answered
            </div>

            <div class="legend-item">
                <span class="legend-color ragu"></span>
                Unsure
            </div>

        </div>

    </aside>

    <main class="exam-content">

        <div class="question-container-box">


            <div class="question-header">

                <h2 id="question-number-title">
                    Question No. 1
                </h2>

                <span class="category-badge" id="question-category">
                    Loading...
                </span>

            </div>

            <div class="question-body" id="question-text">
                Loading question...
            </div>

            <div class="options-container">

                <button class="option-row" data-option="A">
                    <span class="option-badge">A</span>
                    <span class="option-text" id="opt-text-A"></span>
                </button>


                <button class="option-row" data-option="B">
                    <span class="option-badge">B</span>
                    <span class="option-text" id="opt-text-B"></span>
                </button>


                <button class="option-row" data-option="C">
                    <span class="option-badge">C</span>
                    <span class="option-text" id="opt-text-C"></span>
                </button>

            </div>


        </div>

    </main>

</div>

<footer class="prometric-footer">

    <button class="btn-nav btn-secondary" id="btn-prev">
        ◀ PREV
    </button>

    <button class="btn-nav btn-flag" id="btn-flag">
        ⭐ UNSURE
    </button>


    <button class="btn-nav btn-primary" id="btn-next">
        NEXT ▶
    </button>

    <button class="btn-nav btn-submit" id="btn-submit" style="display:none;">
        FINISH TEST ✔
    </button>

</footer>

<div class="pause-overlay" id="pause-modal">

    <div class="pause-card">

        <h2>
            PAUSE
        </h2>

        <p>
            Exam paused
        </p>


        <button class="btn-resume" id="btn-resume">
            ▶ CONTINUE
        </button>

    </div>

</div>


<script src="js/storage.js"></script>
<script src="js/loader.js"></script>
<script src="js/exam.js"></script>
<script src="js/result.js"></script>

</body>
</html>
