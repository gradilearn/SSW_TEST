<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CBT Dashboard</title>
<link rel="stylesheet" href="css/main.css">
</head>

<body>

<div class="brand-label">

    <div class="brand-icon-box">
        <img src="logoSSW.png" class="brand-icon">
    </div>

    <div class="brand-text">
        Specified Skilled<br>Worker Tests
    </div>

</div>

<div class="container">

<header class="dash-header">

    <div class="header-content">
        <h1 id="exam-title-jp">CBT模擬試験</h1>
        <p id="exam-title">Loading...</p>
    </div>


</header>

<section class="stats-section">
    <div class="stat-card">
        <h3>Total Exams</h3>
        <p id="stat-total">0</p>
    </div>

    <div class="stat-card">
        <h3>Average Score</h3>
        <p id="stat-rata">0</p>
    </div>

    <div class="stat-card">
        <h3>Passing Rate</h3>
        <p id="stat-lulus">0%</p>
    </div>
</section>

<section class="action-section">
    <button id="btn-mulai" class="btn btn-primary btn-block">
        Start Simulation
    </button>
</section>

<section class="history-section">

<h2>Exam History</h2>

<table>
<thead>
<tr>
    <th>Date</th>
    <th>Score</th>
    <th>✅/❌</th>
    <th>Status</th>
    <th>Action</th>
</tr>
</thead>

<tbody id="list-riwayat">
<tr>
    <td colspan="5">No exam history available.</td>
</tr>
</tbody>
</table>

<!-- REMOVE HISTORY BUTTON -->
<div class="history-action">
    <button id="btn-remove-history" class="btn btn-remove">
        Remove All History
    </button>
</div>

</section>

</div>

<div id="modalStart" class="modal-overlay" style="display:none;">
<div class="modal-content">

<h2>Fighting Dhepp💗</h2>

<p id="modal-info"></p>

<div class="modal-actions">
<button id="btn-confirm-start" class="btn btn-primary">
Start Now
</button>

<button id="btn-cancel-start" class="btn btn-secondary">
Cancel
</button>
</div>

</div>
</div>

<script src="js/config.js"></script>
<script src="js/loader.js"></script>
<script src="js/storage.js"></script>

<script>
let category=null;
let config=null;

document.addEventListener("DOMContentLoaded",async()=>{

category=localStorage.getItem("examCategory");

if(!category){
    alert("Pilih bidang ujian terlebih dahulu.");
    location.href="index.html";
    return;
}

config=await loadConfig(category);

if(!config){
    alert("Config tidak ditemukan.");
    return;
}

document.title = "CBT Dashboard";

document.getElementById("exam-title").innerHTML = config.title;
document.getElementById("exam-title-jp").innerHTML = config.subtitle;

if(config.theme?.background){

    document.body.style.background=`
    linear-gradient(
        rgba(0,0,0,.45),
        rgba(0,0,0,.45)
    ),
    url('data/${category}/${config.theme.background}')
    center/cover fixed`;

    document.body.style.minHeight="100vh";
}

loadHistory();

document.getElementById("btn-remove-history").onclick = removeHistory;

document.getElementById("btn-mulai").onclick=()=>{
    document.getElementById("modal-info").innerHTML=`
    ${config.title}<br>
    
    <b>${config.totalQuestions} Soal</b><br>
    
    <b>${config.durationMinutes} Menit</b>
    `;

    document.getElementById("modalStart").style.display="flex";
};

document.getElementById("btn-cancel-start").onclick=()=>{
    document.getElementById("modalStart").style.display="none";
};

document.getElementById("btn-confirm-start").onclick=startExam;

// Izinkan tombol ENTER di keyboard untuk memicu "Start Now" saat modal konfirmasi terbuka
document.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
        const modal = document.getElementById("modalStart");
        if (modal && modal.style.display === "flex") {
            e.preventDefault();
            document.getElementById("btn-confirm-start").click();
        }
    }
});

});

async function startExam(){

const btn=document.getElementById("btn-confirm-start");

btn.disabled=true;
btn.innerText="Preparing...";

const questions=await loadQuestions(category);

if(!questions||questions.length===0){
    alert("Bank soal kosong.");
    btn.disabled=false;
    btn.innerText="Start Now";
    return;
}

const selected=shuffle(questions)
.slice(0,config.totalQuestions);

const state={
    category:category,
    questions:selected,
    answers:Array(selected.length).fill(null),
    currentIndex:0,
    remainingTime:config.durationMinutes*60,
    theme:config.theme
};

localStorage.setItem(
"ssw_active_exam_state",
JSON.stringify(state)
);

location.href="exam.html";

}

function loadHistory(){

const history=getExamHistory(category)||[];

document.getElementById("stat-total").innerText=history.length;


const tbody=document.getElementById("list-riwayat");


// RESET TABEL JIKA TIDAK ADA HISTORY
if(history.length===0){

    tbody.innerHTML=`
    <tr>
        <td colspan="5">
            No exam history available.
        </td>
    </tr>
    `;

    document.getElementById("stat-rata").innerText="0";
    document.getElementById("stat-lulus").innerText="0%";

    return;
}

let total=0;
let pass=0;

tbody.innerHTML="";

history.forEach(item=>{

total+=item.score;

if(item.score>=config.passScore){
    pass++;
}

tbody.innerHTML+=`
<tr>
<td>${new Date(item.timestamp).toLocaleDateString("id-ID")}</td>
<td>${item.score}</td>
<td>${item.correct??"-"} / ${item.wrong??"-"}</td>
<td class="${item.score>=config.passScore?"status-pass":"status-fail"}">${item.score>=config.passScore?"Passed":"Failed"}</td>
<td>
<button
    class="btn-review"
    onclick="openReview('${item.id}')">
    Review
</button>
</td>
</tr>
`;

});

document.getElementById("stat-rata").innerText=
Math.round(total/history.length);

document.getElementById("stat-lulus").innerText=
Math.round((pass/history.length)*100)+"%";

}

function openReview(id){

localStorage.setItem(
"ssw_review_target_id",
id
);

location.href="result.html";
}


function removeHistory(){

    const history = getExamHistory(category) || [];

    // CEK JIKA HISTORY KOSONG
    if(history.length === 0){

        showToast("No exam history available.");

        return;
    }

    // KONFIRMASI HAPUS
    if(!confirm(
        "Are you sure you want to remove all exam history?"
    )){
        return;
    }

    // hapus history kategori aktif
    clearExamHistory(category);

    // hapus detail hasil kategori aktif
    Object.keys(localStorage).forEach(key => {

        if(key.startsWith("ssw_result_")){

            try {

                const data = JSON.parse(
                    localStorage.getItem(key)
                );

                if(data.category === category){

                    localStorage.removeItem(key);

                }

            } catch(e){

                console.error(
                    "Invalid result data:",
                    key
                );
            }
        }
    });

    // hapus target review terakhir
    localStorage.removeItem(
        "ssw_review_target_id"
    );

    // refresh tampilan dashboard
    loadHistory();

    showToast(
        "All exam history has been removed."
    );

}

function shuffle(arr){
return [...arr].sort(()=>Math.random()-0.5);
}

function goBack(){
    location.href = "index.html";
}

function showToast(message){

    const toast = document.createElement("div");

    toast.innerText = message;

    toast.style.position = "fixed";
    toast.style.bottom = "30px";
    toast.style.left = "50%";
    toast.style.transform = "translateX(-50%)";

    toast.style.background="#dc3545";
    toast.style.color="#fff";

    toast.style.padding="10px 18px";
    toast.style.borderRadius="8px";

    toast.style.fontWeight="600";
    toast.style.fontSize="0.9rem";

    toast.style.width="fit-content";
    toast.style.maxWidth="300px";

    toast.style.textAlign="center";
    toast.style.whiteSpace="nowrap";

    toast.style.boxShadow=
    "0 6px 15px rgba(220,53,69,.35)";

    document.body.appendChild(toast);


    setTimeout(()=>{
        toast.style.opacity="1";
    },50);


    setTimeout(()=>{

        toast.style.opacity="0";

        setTimeout(()=>{
            toast.remove();
        },300);

    },2000);

}
</script>

<!-- Tombol Kembali -->
<button id="btn-back" class="btn-back" onclick="goBack()">
    Back 
</button>

</body>
</html>
